<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>うさぎのりんご大冒険</title>
<style>
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#1a1a2e; font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c","Yu Gothic",sans-serif;
    -webkit-user-select:none; user-select:none;
  }
  #game{ display:block; width:100%; height:100%; touch-action:none; }
  #overlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .panel{
    pointer-events:auto;
    background:rgba(255,247,240,0.96);
    border:5px solid #6b4034;
    border-radius:28px;
    padding:28px 34px;
    text-align:center;
    max-width:min(90vw,520px);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }
  .panel h1{ margin:0 0 6px; font-size:26px; color:#6b4034; }
  .panel p{ margin:6px 0; color:#7a5c4d; font-size:14px; line-height:1.6; }
  .panel .big{ font-size:20px; color:#c0567a; font-weight:bold; margin:10px 0; }
  .btn{
    display:inline-block; margin-top:14px; padding:12px 34px;
    background:#ff9eb5; color:#fff; font-size:18px; font-weight:bold;
    border:none; border-radius:999px; cursor:pointer;
    box-shadow:0 5px 0 #d9718f;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 2px 0 #d9718f; }
  .hidden{ display:none !important; }
  #controls{
    position:fixed; left:0; right:0; bottom:0; height:0; pointer-events:none;
  }
  .ctlBtn{
    position:fixed; bottom:24px; pointer-events:auto;
    width:68px; height:68px; border-radius:50%;
    background:rgba(107,64,52,0.35); border:3px solid rgba(255,255,255,0.6);
    display:flex; align-items:center; justify-content:center;
    font-size:26px; color:#fff; touch-action:none;
  }
  #btnLeft{ left:18px; }
  #btnRight{ left:98px; }
  #btnJump{ right:22px; width:84px; height:84px; font-size:15px; background:rgba(255,158,181,0.55); }
  .hud{
    position:fixed; top:10px; left:0; right:0; display:flex; justify-content:space-between;
    padding:0 14px; pointer-events:none; color:#fff; font-weight:bold; text-shadow:0 2px 3px rgba(0,0,0,0.5);
    font-size:16px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud hidden" id="hud">
  <div id="hudLeft">🍎 <span id="scoreVal">0</span></div>
  <div id="hudRight"></div>
</div>

<div id="controls">
  <div class="ctlBtn hidden" id="btnLeft">◀</div>
  <div class="ctlBtn hidden" id="btnRight">▶</div>
  <div class="ctlBtn hidden" id="btnJump">ジャンプ</div>
</div>

<div id="overlay">
  <div class="panel" id="startPanel">
    <h1>🐰 うさぎのりんご大冒険</h1>
    <p>障害物をよけながらりんごを集め、ゴールを目指そう！<br>敵は上から踏んでやっつけよう。ステージを進むほど難しくなるよ。</p>
    <p>りんごを20個集めるごとにライフが1つ増えるよ🍎</p>
    <p>PC： ← → で移動 / スペース or ↑ でジャンプ<br>スマホ：画面下のボタンで操作</p>
    <div class="big">ベストスコア：<span id="bestScoreStart">0</span></div>
    <button class="btn" id="startBtn">スタート</button>
  </div>
  <div class="panel hidden" id="overPanel">
    <h1>ゲームオーバー</h1>
    <p class="big">スコア：<span id="finalScore">0</span></p>
    <p>到達ステージ：<span id="finalStage">1</span> / 6</p>
    <p>進んだ距離：<span id="finalDist">0</span> m</p>
    <p>ベストスコア：<span id="bestScoreEnd">0</span></p>
    <button class="btn hidden" id="continueBtn">ステージ<span id="continueStageNum">1</span>からつづける</button>
    <button class="btn" id="retryBtn">さいしょから</button>
  </div>
  <div class="panel hidden" id="clearPanel">
    <h1>🎉 ステージ<span id="clearStageNum">1</span> クリア！</h1>
    <p class="big">スコア：<span id="clearScore">0</span></p>
    <button class="btn" id="nextBtn">次のステージへ</button>
  </div>
  <div class="panel hidden" id="allClearPanel">
    <h1>🏆 全ステージクリア！</h1>
    <p class="big">最終スコア：<span id="allClearScore">0</span></p>
    <p>ベストスコア：<span id="allClearBest">0</span></p>
    <button class="btn" id="playAgainBtn">最初から遊ぶ</button>
  </div>
</div>

  canvas.height = Math.round(h*dpr);
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  BASE_W = BASE_H * (w/h);
}

/* ===================== サウンド(簡易WebAudio) ===================== */
let actx = null;
function sfx(freq, dur, type, vol){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type||'sine';
    o.frequency.value = freq;
    g.gain.value = (vol!==undefined?vol:0.15);
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.stop(actx.currentTime + dur);
  }catch(e){}
}
const SFX = {
  jump: ()=>sfx(520,0.12,'square',0.12),
  collect: ()=>sfx(880,0.14,'triangle',0.15),
  stomp: ()=>sfx(220,0.15,'sawtooth',0.15),
  hit: ()=>sfx(120,0.3,'sawtooth',0.18),
  oneup: ()=>{ sfx(660,0.12,'triangle',0.16); setTimeout(()=>sfx(880,0.12,'triangle',0.16),100); setTimeout(()=>sfx(1320,0.2,'triangle',0.18),200); },
  breakBlock: ()=>sfx(180,0.12,'square',0.16),
  gameover: ()=>{ sfx(300,0.2,'sawtooth',0.15); setTimeout(()=>sfx(180,0.35,'sawtooth',0.15),150); }
};

/* ===================== BGM(簡易ループ) ===================== */
let musicTimer = null;
let musicStep = 0;
const MUSIC_NOTES = [261.6, 329.6, 392.0, 329.6, 293.7, 349.2, 440.0, 349.2];
function startMusic(){
  if(musicTimer) return;
  musicTimer = setInterval(()=>{
    if(!actx || actx.state !== 'running') return;
    const base = MUSIC_NOTES[musicStep % MUSIC_NOTES.length];
    sfx(base/2, 0.35, 'triangle', 0.045);
    if(musicStep % 2 === 0) sfx(base, 0.18, 'sine', 0.03);
    musicStep++;
  }, 260);
}

/* ===================== ゲーム状態 ===================== */
const NUM_STAGES = 6;
let state = 'start'; // start | playing | stageclear | allclear | over
let camera = { x:0 };
let player, segments, hazards, enemies, apples, particles, platforms, crates;
let lastGroundY, generatedUntilX, lastSafeX, lastSafeY;
let score, lives, distance, bestScore;
let stage = 1, stageGoalX = 0, goal = null;
let jumpQueued = false, jumpHeld = false, touchJumpHeld = false;
let applesCollected = 0;
let lastChunkType = 'flat', hardStreak = 0;
let toastText = '', toastT = 0;

bestScore = parseInt(localStorage.getItem('usagi_best')||'0', 10) || 0;
document.getElementById('bestScoreStart').textContent = bestScore;

function resetGame(){
  stage = 1;
  score = 0;
  lives = 3;
  applesCollected = 0;
  jumpQueued = false;
  setupStage(stage);
}

function setupStage(n){
  player = { x:80, y:GROUND_Y-PLAYER_H, w:PLAYER_W, h:PLAYER_H, vx:0, vy:0, onGround:false, facing:1, invuln:0, animT:0, coyoteT:0, jumpBufferT:0, jumpCut:false };
  segments = [];
  hazards = [];
  enemies = [];
  apples = [];
  particles = [];
  platforms = [];
  crates = [];
  camera.x = 0;
  lastGroundY = GROUND_Y;
  generatedUntilX = 0;
  lastSafeX = player.x;
  lastSafeY = GROUND_Y;
  distance = 0;
  goal = null;
  lastChunkType = 'flat';
  hardStreak = 0;
  stageGoalX = 6000 + (n-1)*1500; // スーパーマリオ程度の距離感

  // 最初の安全な足場をまとまった距離ぶん確保
  segments.push({x1:-50, x2:520, y:GROUND_Y});
  lastGroundY = GROUND_Y;
  generatedUntilX = 520;
  while(!goal){ genChunk(); }

  document.getElementById('hudRight').textContent = 'ステージ ' + n + ' / ' + NUM_STAGES;
}

/* ===================== ステージ自動生成 ===================== */
function difficultyT(){
  // ステージ番号に応じて0→1に上がる難易度係数
  return clamp((stage-1)/(NUM_STAGES-1), 0, 1);
}

function spawnAppleRow(x1,x2,groundY){
  const n = Math.max(1, Math.floor((x2-x1)/70));
  for(let i=0;i<n;i++){
    const ax = x1 + (i+0.5)*((x2-x1)/n) + rand(-10,10);
    apples.push({ x:ax, y: groundY-70-rand(0,40), r:12, alive:true });
  }
}
function spawnEnemy(x1,x2,groundY){
  const ex = rand(x1,x2-40);
  const t = difficultyT();
  const tier = t < 0.3 ? 0 : (t < 0.6 ? 1 : 2);
  const speedBase = [58,95,145][tier];
  enemies.push({ x:ex, y:groundY-30, w:30, h:30, vx: rand(speedBase*0.85,speedBase*1.25)*(Math.random()<0.5?-1:1), minX:x1, maxX:x2-30, alive:true, animT:Math.random()*10, tier });
}

function genChunk(){
  const startX = generatedUntilX;
  const prevY = lastGroundY;
  const t = difficultyT();

  const remaining = stageGoalX - startX;
  if(remaining <= 500){
    const w = Math.max(remaining + 80, 320);
    segments.push({x1:startX, x2:startX+w, y:prevY});
    lastGroundY = prevY;
    generatedUntilX = startX+w;
    goal = { x: startX + Math.max(remaining,140), y: prevY, reached:false };
    return;
  }

  const r = Math.random();
  let type;
  const flatP = clamp(0.34 - t*0.18, 0.16, 0.34);
  const gapP  = clamp(0.20 + t*0.06, 0.20, 0.26);
  const stepP = 0.14;
  const crateP = clamp(0.12 + t*0.06, 0.12, 0.18);
  const floatgapP = clamp(0.06 + t*0.10, 0.06, 0.16);
  if(startX < 700) type = 'flat'; // 開始直後は必ず安全地帯
  else if(r < flatP) type = 'flat';
  else if(r < flatP+gapP) type = 'gap';
  else if(r < flatP+gapP+stepP) type = 'step';
  else if(r < flatP+gapP+stepP+crateP) type = 'crate';
  else if(r < flatP+gapP+stepP+crateP+floatgapP) type = 'floatgap';
  else type = 'spike';

  // フェアネス調整: 難所が連続しすぎない・隙間系の直後にトゲを置かない
  if(startX >= 700){
    if(hardStreak >= 2 && type !== 'flat') type = 'flat';
    if((lastChunkType === 'gap' || lastChunkType === 'floatgap') && type === 'spike') type = (Math.random()<0.5?'flat':'step');
  }
  lastChunkType = type;
  hardStreak = (type === 'flat') ? 0 : hardStreak+1;

  if(type === 'flat'){
    const w = rand(280,480);
    segments.push({x1:startX, x2:startX+w, y:prevY});
    if(Math.random() < 0.65) spawnAppleRow(startX+40, startX+w-40, prevY);
    if(Math.random() < 0.35+0.35*t && w > 300) spawnEnemy(startX+w*0.25, startX+w*0.8, prevY);
    if(Math.random() < 0.15*t && w > 380) spawnEnemy(startX+w*0.55, startX+w*0.95, prevY);
    // 戻ってジャンプしないと届かないボーナス足場(任意ルート)
    if(Math.random() < 0.22 && w > 340){
      const bx1 = startX + w*0.58;
      const bw = rand(70,110);
      const by = prevY - rand(88,118);
      platforms.push({x1:bx1, x2:bx1+bw, y:by});
      apples.push({x:bx1+bw*0.5, y:by-28, r:12, alive:true});
    }
    lastGroundY = prevY;
    generatedUntilX = startX+w;
  } else if(type === 'gap'){
    const gapW = clamp(rand(70,130) + t*35, 70, 165);
    const nextW = rand(260,420);
    if(segments.length){ segments[segments.length-1].warnEdge = true; }
    segments.push({x1:startX+gapW, x2:startX+gapW+nextW, y:prevY});
    if(Math.random() < 0.5) apples.push({x:startX+gapW/2, y:prevY-100, r:12, alive:true});
    if(Math.random() < 0.6) spawnAppleRow(startX+gapW+30, startX+gapW+nextW-30, prevY);
    if(Math.random() < 0.2*t) spawnEnemy(startX+gapW+90, startX+gapW+nextW-30, prevY);
    lastGroundY = prevY;
    generatedUntilX = startX+gapW+nextW;
  } else if(type === 'step'){
    const dy = (Math.random()<0.5?-1:1) * rand(35,90);
    const newY = clamp(prevY+dy, GROUND_Y-150, GROUND_Y);
    const w = rand(240,400);
    segments.push({x1:startX, x2:startX+w, y:newY});
    if(Math.random() < 0.55) spawnAppleRow(startX+30, startX+w-30, newY);
    if(Math.random() < 0.25+0.35*t) spawnEnemy(startX+w*0.3, startX+w*0.8, newY);
    lastGroundY = newY;
    generatedUntilX = startX+w;
  } else if(type === 'crate'){
    // 壊せるクレート: 上から踏むと壊れる/横からはぶつかって止まる(ジャンプで越えることも可能)
    const w = rand(260,420);
    segments.push({x1:startX, x2:startX+w, y:prevY});
    const ccx = startX + w*0.5;
    const crateH = rand(55,80);
    crates.push({x1:ccx-18, x2:ccx+18, y:prevY-crateH, bottom:prevY, alive:true});
    if(Math.random() < 0.5) spawnAppleRow(startX+20, ccx-40, prevY);
    if(Math.random() < 0.5) spawnAppleRow(ccx+40, startX+w-20, prevY);
    lastGroundY = prevY;
    generatedUntilX = startX+w;
  } else if(type === 'floatgap'){
    // 浮遊足場を挟んだ長い隙間: 1回のジャンプでは届かない距離を2段ジャンプで越える
    const gap1 = clamp(rand(70,120) + t*20, 70, 150);
    const platW = rand(90,140);
    const gap2 = clamp(rand(70,120) + t*20, 70, 150);
    const nextW = rand(240,380);
    const platY = prevY - rand(20,70);
    if(segments.length){ segments[segments.length-1].warnEdge = true; }
    platforms.push({x1:startX+gap1, x2:startX+gap1+platW, y:platY});
    segments.push({x1:startX+gap1+platW+gap2, x2:startX+gap1+platW+gap2+nextW, y:prevY});
    if(Math.random() < 0.6) apples.push({x:startX+gap1+platW*0.5, y:platY-30, r:12, alive:true});
    if(Math.random() < 0.5) spawnAppleRow(startX+gap1+platW+gap2+30, startX+gap1+platW+gap2+nextW-30, prevY);
    lastGroundY = prevY;
    generatedUntilX = startX+gap1+platW+gap2+nextW;
  } else { // spike
    const w = rand(280,440);
    segments.push({x1:startX, x2:startX+w, y:prevY});
    const sx = startX + w*0.5;
    const spikeRoll = Math.random();
    const spikeCount = spikeRoll < 0.15+0.30*t ? 3 : (spikeRoll < 0.45+0.30*t ? 2 : 1);
    for(let i=0;i<spikeCount;i++){
      hazards.push({x:sx-25+i*25, y:prevY-22, w:22, h:22});
    }
    if(Math.random() < 0.45) spawnAppleRow(startX+20, sx-45, prevY);
    if(Math.random() < 0.2*t) spawnEnemy(startX+w*0.6, startX+w*0.9, prevY);
    lastGroundY = prevY;
    generatedUntilX = startX+w;
  }
}

function cleanupWorld(){
  const cutoff = camera.x - 400;
  segments = segments.filter(s=>s.x2 > cutoff);
  hazards = hazards.filter(h=>h.x+h.w > cutoff);
  enemies = enemies.filter(e=>e.alive && e.x+e.w > cutoff);
  apples = apples.filter(a=>a.alive && a.x > cutoff);
  particles = particles.filter(p=>p.life>0);
  platforms = platforms.filter(p=>p.x2 > cutoff);
  crates = crates.filter(c=>c.alive && c.x2 > cutoff);
}

function findGroundAt(cx){
  for(const s of segments){ if(cx >= s.x1 && cx <= s.x2) return s; }
  for(const p of platforms){ if(cx >= p.x1 && cx <= p.x2) return p; }
  return null;
}

// 前方に隙間やトゲが無いか調べる(安全な復帰地点にだけチェックポイントを更新するため)
function isClearAhead(cx, lookDist){
  for(const h of hazards){
    if(h.x < cx+lookDist && h.x+h.w > cx) return false;
  }
  for(let d=10; d<=lookDist; d+=20){
    if(!findGroundAt(cx+d)) return false;
  }
  return true;
}

/* ===================== 入力 ===================== */
const keys = { left:false, right:false };
window.addEventListener('keydown', e=>{
  if(['ArrowLeft','a','A'].includes(e.key)) keys.left = true;
  if(['ArrowRight','d','D'].includes(e.key)) keys.right = true;
  if(['ArrowUp','w','W',' '].includes(e.key)){ jumpQueued = true; jumpHeld = true; e.preventDefault(); }
  if(e.key === 'Enter'){
    if(state==='start') startGame();
    else if(state==='over') startGame();
    else if(state==='stageclear') nextStage();
    else if(state==='allclear') startGame();
  }
});
window.addEventListener('keyup', e=>{
  if(['ArrowLeft','a','A'].includes(e.key)) keys.left = false;
  if(['ArrowRight','d','D'].includes(e.key)) keys.right = false;
  if(['ArrowUp','w','W',' '].includes(e.key)) jumpHeld = false;
});

function bindHoldButton(el, onDown, onUp){
  el.addEventListener('pointerdown', e=>{ e.preventDefault(); try{el.setPointerCapture(e.pointerId);}catch(err){} onDown(); });
  el.addEventListener('pointerup', e=>{ e.preventDefault(); onUp(); });
  el.addEventListener('pointercancel', e=>{ onUp(); });
  el.addEventListener('pointerleave', e=>{ onUp(); });
}
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnJump = document.getElementById('btnJump');
let touchLeft=false, touchRight=false;
bindHoldButton(btnLeft, ()=>touchLeft=true, ()=>touchLeft=false);
bindHoldButton(btnRight, ()=>touchRight=true, ()=>touchRight=false);
bindHoldButton(btnJump, ()=>{ jumpQueued = true; touchJumpHeld = true; }, ()=>{ touchJumpHeld = false; });

/* ===================== ゲーム制御 ===================== */
const startPanel = document.getElementById('startPanel');
const overPanel = document.getElementById('overPanel');
const continueBtn = document.getElementById('continueBtn');
const clearPanel = document.getElementById('clearPanel');
const allClearPanel = document.getElementById('allClearPanel');
const hud = document.getElementById('hud');
const scoreVal = document.getElementById('scoreVal');

function showControlsUI(show){
  [btnLeft,btnRight,btnJump].forEach(b=> b.classList.toggle('hidden', !show));
  hud.classList.toggle('hidden', !show);
}

function startGame(){
  resetGame();
  state = 'playing';
  startPanel.classList.add('hidden');
  overPanel.classList.add('hidden');
  clearPanel.classList.add('hidden');
  allClearPanel.classList.add('hidden');
  showControlsUI(true);
  if(actx && actx.state==='suspended') actx.resume();
  startMusic();
}

function continueStage(){
  const s = stage;
  score = 0;
  lives = 3;
  applesCollected = 0;
  overPanel.classList.add('hidden');
  setupStage(s);
  state = 'playing';
  showControlsUI(true);
  if(actx && actx.state==='suspended') actx.resume();
  startMusic();
}

function stageClear(){
  state = 'stageclear';
  showControlsUI(false);
  SFX.collect();
  document.getElementById('clearStageNum').textContent = stage;
  document.getElementById('clearScore').textContent = score;
  clearPanel.classList.remove('hidden');
}

function nextStage(){
  clearPanel.classList.add('hidden');
  stage++;
  if(stage > NUM_STAGES){ allClear(); return; }
  setupStage(stage);
  state = 'playing';
  showControlsUI(true);
}

function allClear(){
  state = 'allclear';
  showControlsUI(false);
  if(score > bestScore){ bestScore = score; localStorage.setItem('usagi_best', String(bestScore)); }
  document.getElementById('allClearScore').textContent = score;
  document.getElementById('allClearBest').textContent = bestScore;
  allClearPanel.classList.remove('hidden');
}

function loseLife(){
  if(player.invuln > 0) return;
  lives--;
  SFX.hit();
  spawnBurst(player.x+player.w/2, player.y+player.h/2, '#e15b5b');
  if(lives <= 0){ endGame(); return; }
  player.invuln = 1.6;
  player.x = lastSafeX;
  player.y = lastSafeY - player.h;
  player.vx = 0; player.vy = 0;
}

function endGame(){
  state = 'over';
  SFX.gameover();
  showControlsUI(false);
  const dist = Math.floor(distance/20);
  if(score > bestScore){ bestScore = score; localStorage.setItem('usagi_best', String(bestScore)); }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalStage').textContent = stage;
  document.getElementById('finalDist').textContent = dist;
  document.getElementById('bestScoreEnd').textContent = bestScore;
  if(stage > 1){
    document.getElementById('continueStageNum').textContent = stage;
    continueBtn.classList.remove('hidden');
  } else {
    continueBtn.classList.add('hidden');
  }
  overPanel.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
continueBtn.addEventListener('click', continueStage);
document.getElementById('nextBtn').addEventListener('click', nextStage);
document.getElementById('playAgainBtn').addEventListener('click', startGame);

function spawnBurst(x,y,color){
  for(let i=0;i<8;i++){
    particles.push({ x,y, vx:rand(-140,140), vy:rand(-220,-40), life:0.5, color });
  }
}

/* ===================== 更新処理 ===================== */
function update(dt){
  if(state !== 'playing') return;

  // 左右移動(加減速つき)
  const left = keys.left || touchLeft;
  const right = keys.right || touchRight;
  const ACCEL = 1800, DECEL = 2200;
  if(left && !right){ player.vx = Math.max(player.vx - ACCEL*dt, -MOVE_SPEED); player.facing=-1; }
  else if(right && !left){ player.vx = Math.min(player.vx + ACCEL*dt, MOVE_SPEED); player.facing=1; }
  else if(player.vx > 0){ player.vx = Math.max(0, player.vx - DECEL*dt); }
  else if(player.vx < 0){ player.vx = Math.min(0, player.vx + DECEL*dt); }

  // ジャンプ(コヨーテタイム+先行入力バッファ+可変ジャンプ高)
  const wasOnGround = player.onGround;
  if(jumpQueued){ player.jumpBufferT = 0.12; }
  jumpQueued = false;
  if(player.jumpBufferT > 0) player.jumpBufferT -= dt;
  const canJump = player.onGround || player.coyoteT > 0;
  if(player.jumpBufferT > 0 && canJump){
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.coyoteT = 0;
    player.jumpBufferT = 0;
    player.jumpCut = false;
    SFX.jump();
  }
  const jumpHeldNow = jumpHeld || touchJumpHeld;
  if(player.vy < 0 && !jumpHeldNow && !player.jumpCut){
    player.vy *= 0.45;
    player.jumpCut = true;
  }

  // 重力
  player.vy = clamp(player.vy + GRAVITY*dt, -99999, MAX_FALL);

  const prevBottom = player.y + player.h;
  const prevX = player.x;
  player.x += player.vx*dt;

  // 壁判定(段差やクレートの側面にめり込むバグの修正): 足元がその足場の面より下にある時だけ側面を壁として扱う
  const solids = segments.concat(crates);
  for(const s of solids){
    if(player.y + player.h <= s.y + 2) continue;
    const overlapX = player.x < s.x2 && player.x + player.w > s.x1;
    if(!overlapX) continue;
    if(player.vx > 0 && prevX + player.w <= s.x1 + 1){
      player.x = s.x1 - player.w; player.vx = 0;
    } else if(player.vx < 0 && prevX >= s.x2 - 1){
      player.x = s.x2; player.vx = 0;
    }
  }

  player.y += player.vy*dt;

  if(player.x < 10) player.x = 10;

  // クレートを上から踏むと壊れる
  for(const c of crates){
    if(!c.alive) continue;
    const overlapX = player.x < c.x2 && player.x + player.w > c.x1;
    if(overlapX && player.vy > 0 && prevBottom <= c.y + 6 && (player.y+player.h) >= c.y){
      c.alive = false;
      player.vy = BOUNCE_VEL*0.7;
      score += 5;
      SFX.breakBlock();
      spawnBurst((c.x1+c.x2)/2, c.y, '#c9a06a');
    }
  }
  if(crates.some(c=>!c.alive)) crates = crates.filter(c=>c.alive);

  // 地面判定(中心x基準)
  const cx = player.x + player.w/2;
  const seg = findGroundAt(cx);
  player.onGround = false;
  if(seg){
    const bottom = player.y + player.h;
    if(player.vy >= 0 && bottom >= seg.y && prevBottom <= seg.y + 2){
      const impactSpeed = player.vy;
      player.y = seg.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumpCut = false;
      if(!wasOnGround && impactSpeed > 260){
        spawnBurst(player.x+player.w/2, player.y+player.h, '#c9a06a');
      }
      const hazardHere = hazards.some(h=> Math.abs((h.x+h.w/2)-cx) < 26 && Math.abs(h.y-seg.y) < 30);
      if(!hazardHere && isClearAhead(cx, 150)){ lastSafeX = player.x; lastSafeY = seg.y; }
    }
  }
  if(wasOnGround && !player.onGround){ player.coyoteT = 0.12; }
  else if(player.coyoteT > 0){ player.coyoteT -= dt; }

  // 落下死(隙間に落ちた)
  if(player.y > BASE_H + 200){
    loseLife();
  }

  // ハザード(トゲ)判定
  if(player.invuln <= 0){
    for(const h of hazards){
      if(rectsOverlap(player, h)){ loseLife(); break; }
    }
  }

  // 敵判定
  for(const en of enemies){
    if(!en.alive) continue;
    en.x += en.vx*dt;
    if(en.x < en.minX){ en.x = en.minX; en.vx *= -1; }
    if(en.x > en.maxX){ en.x = en.maxX; en.vx *= -1; }
    en.animT += dt;
    if(rectsOverlap(player, en)){
      if(player.vy > 0 && (prevBottom - player.vy*dt) <= en.y + 6){
        en.alive = false;
        player.vy = BOUNCE_VEL;
        score += 20;
        SFX.stomp();
        spawnBurst(en.x+en.w/2, en.y+en.h/2, '#8a6dd6');
      } else if(player.invuln <= 0){
        loseLife();
      }
    }
  }

  // りんご収集
  for(const ap of apples){
    if(!ap.alive) continue;
    const dx = (player.x+player.w/2) - ap.x, dy = (player.y+player.h/2) - ap.y;
    if(Math.sqrt(dx*dx+dy*dy) < ap.r + 22){
      ap.alive = false;
      score += 10;
      applesCollected++;
      SFX.collect();
      spawnBurst(ap.x, ap.y, '#ff6b6b');
      if(applesCollected % 20 === 0){
        lives = Math.min(lives+1, 9);
        SFX.oneup();
        toastText = '1UP！';
        toastT = 1.5;
        spawnBurst(player.x+player.w/2, player.y, '#ffd23f');
      }
    }
  }

  if(player.invuln > 0) player.invuln -= dt;
  if(toastT > 0) toastT -= dt;
  player.animT += dt;

  distance = Math.max(distance, player.x);

  // カメラ追従(後戻りしない)
  const desired = player.x - BASE_W*0.35;
  camera.x = Math.max(camera.x, Math.max(0, desired));

  // ワールド生成/掃除
  while(!goal && generatedUntilX < camera.x + BASE_W*2.5){ genChunk(); }
  cleanupWorld();

  // ゴール判定
  if(state==='playing' && goal && !goal.reached && player.x + player.w*0.5 >= goal.x){
    goal.reached = true;
    stageClear();
  }

  // パーティクル更新
  for(const p of particles){
    p.vy += 900*dt;
    p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
  }

  scoreVal.textContent = score;
}

/* ===================== 描画 ===================== */
function worldToScreenX(x){ return x - camera.x; }

function drawBackground(){
  const g = ctx.createLinearGradient(0,0,0,BASE_H);
  g.addColorStop(0, '#8fd3ff');
  g.addColorStop(1, '#e9f8ff');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,BASE_W,BASE_H);

  // 雲(視差)
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for(let i=0;i<6;i++){
    const wx = (i*380 - (camera.x*0.25) % 2280);
    const cx2 = ((wx % (BASE_W+400)) + (BASE_W+400)) % (BASE_W+400) - 200;
    const cy = 60 + (i%3)*40;
    roundCloud(cx2, cy);
  }
  // 遠景の丘
  ctx.fillStyle = '#bfe6a8';
  for(let i=0;i<5;i++){
    const wx = (i*320 - (camera.x*0.5) % 1600);
    const hx = ((wx % (BASE_W+300)) + (BASE_W+300)) % (BASE_W+300) - 150;
    ctx.beginPath();
    ctx.ellipse(hx, GROUND_Y+40, 160, 90, 0, Math.PI, 0);
    ctx.fill();
  }
}
function roundCloud(x,y){
  ctx.beginPath();
  ctx.ellipse(x,y,34,20,0,0,Math.PI*2);
  ctx.ellipse(x+28,y+6,26,16,0,0,Math.PI*2);
  ctx.ellipse(x-26,y+8,22,14,0,0,Math.PI*2);
  ctx.fill();
}

function drawPits(){
  const sorted = segments.slice().sort((a,b)=>a.x1-b.x1);
  for(let i=0;i<sorted.length-1;i++){
    const a = sorted[i], b = sorted[i+1];
    if(b.x1 - a.x2 > 2){
      const x1 = worldToScreenX(a.x2), x2 = worldToScreenX(b.x1);
      if(x2 < -20 || x1 > BASE_W+20) continue;
      const topY = Math.min(a.y,b.y);
      const g = ctx.createLinearGradient(0, topY, 0, BASE_H);
      g.addColorStop(0, 'rgba(25,15,35,0.55)');
      g.addColorStop(1, 'rgba(10,5,15,0.88)');
      ctx.fillStyle = g;
      ctx.fillRect(x1, topY, x2-x1, BASE_H-topY);
    }
  }
}

function drawSegments(){
  for(const s of segments){
    const x1 = worldToScreenX(s.x1), x2 = worldToScreenX(s.x2);
    if(x2 < -20 || x1 > BASE_W+20) continue;
    const y = s.y;
    ctx.fillStyle = '#8bc76a';
    ctx.fillRect(x1, y, x2-x1, 18);
    ctx.fillStyle = '#b98455';
    ctx.fillRect(x1, y+18, x2-x1, BASE_H - (y+18) + 40);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(x1, y+18, x2-x1, 6);
    if(s.warnEdge){
      const stripeW = 18;
      for(let sx=0; sx<stripeW; sx+=6){
        ctx.fillStyle = (Math.floor(sx/6)%2===0) ? '#ffd23f' : '#2a2a2a';
        ctx.fillRect(x2-stripeW+sx, y-5, 6, 5);
      }
    }
  }
}

function drawPlatforms(){
  for(const p of platforms){
    const x1 = worldToScreenX(p.x1), x2 = worldToScreenX(p.x2);
    if(x2 < -20 || x1 > BASE_W+20) continue;
    ctx.fillStyle = '#7fbf5a';
    ctx.fillRect(x1, p.y-4, x2-x1, 5);
    ctx.fillStyle = '#c9925a';
    ctx.fillRect(x1, p.y, x2-x1, 12);
    ctx.fillStyle = '#a97540';
    ctx.fillRect(x1, p.y+12, x2-x1, 7);
  }
}

function drawCrates(){
  for(const c of crates){
    if(!c.alive) continue;
    const x1 = worldToScreenX(c.x1), x2 = worldToScreenX(c.x2);
    if(x2 < -20 || x1 > BASE_W+20) continue;
    ctx.fillStyle = '#d8a05a';
    ctx.fillRect(x1, c.y, x2-x1, c.bottom-c.y);
    ctx.strokeStyle = '#8a5a2a'; ctx.lineWidth = 3;
    ctx.strokeRect(x1, c.y, x2-x1, c.bottom-c.y);
    ctx.beginPath();
    ctx.moveTo(x1, c.y); ctx.lineTo(x2, c.bottom);
    ctx.moveTo(x2, c.y); ctx.lineTo(x1, c.bottom);
    ctx.stroke();
  }
}

function drawHazards(){
  ctx.fillStyle = '#c94b4b';
  for(const h of hazards){
    const x = worldToScreenX(h.x);
    if(x < -30 || x > BASE_W+30) continue;
    ctx.beginPath();
    ctx.moveTo(x, h.y+h.h);
    ctx.lineTo(x+h.w/2, h.y);
    ctx.lineTo(x+h.w, h.y+h.h);
    ctx.closePath();
    ctx.fill();
  }
}

function drawApples(){
  for(const a of apples){
    if(!a.alive) continue;
    const x = worldToScreenX(a.x);
    if(x < -20 || x > BASE_W+20) continue;
    ctx.fillStyle = '#e0453f';
    ctx.beginPath();
    ctx.arc(x, a.y, a.r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#8a2a24'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle = '#6b4034';
    ctx.fillRect(x-1.5, a.y-a.r-6, 3, 6);
    ctx.fillStyle = '#5fae4a';
    ctx.beginPath();
    ctx.ellipse(x+6, a.y-a.r-3, 6, 3, -0.5, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawEnemies(){
  const PALETTE = [
    {base:'#a48bea', dark:'#5f49a8', spike:'#7057c4'},
    {base:'#f08a54', dark:'#a84f28', spike:'#c06a3a'},
    {base:'#ef5b78', dark:'#a12038', spike:'#c9435f'},
  ];
  for(const en of enemies){
    if(!en.alive) continue;
    const x = worldToScreenX(en.x);
    if(x < -50 || x > BASE_W+50) continue;
    const bob = Math.sin(en.animT*8)*2;
    const cx = x+en.w/2, cy = en.y+en.h/2+bob;
    const r = en.w/2;
    const pal = PALETTE[en.tier||0];

    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(cx, en.y+en.h+3, r*0.9, 4, 0,0,Math.PI*2); ctx.fill();

    // とげ
    const spikeN = 6 + (en.tier||0)*2;
    ctx.fillStyle = pal.spike;
    for(let i=0;i<spikeN;i++){
      const ang = (i/spikeN)*Math.PI*2 + en.animT*0.6;
      const tx = cx+Math.cos(ang)*r*1.35, ty = cy+Math.sin(ang)*r*1.35;
      const pax = cx+Math.cos(ang-0.18)*r*0.78, pay = cy+Math.sin(ang-0.18)*r*0.78;
      const pbx = cx+Math.cos(ang+0.18)*r*0.78, pby = cy+Math.sin(ang+0.18)*r*0.78;
      ctx.beginPath();
      ctx.moveTo(pax,pay); ctx.lineTo(tx,ty); ctx.lineTo(pbx,pby); ctx.closePath();
      ctx.fill();
    }

    // 本体(グラデーション)
    const grad = ctx.createRadialGradient(cx-r*0.3,cy-r*0.35,r*0.15,cx,cy,r);
    grad.addColorStop(0, pal.base);
    grad.addColorStop(1, pal.dark);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = pal.dark; ctx.lineWidth = 2; ctx.stroke();

    // 怒り眉
    ctx.strokeStyle = '#2a1f40'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx-r*0.55,cy-r*0.32); ctx.lineTo(cx-r*0.12,cy-r*0.14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+r*0.55,cy-r*0.32); ctx.lineTo(cx+r*0.12,cy-r*0.14); ctx.stroke();

    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-r*0.35,cy-r*0.02,r*0.30,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.35,cy-r*0.02,r*0.30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a1f40';
    ctx.beginPath(); ctx.arc(cx-r*0.30,cy+r*0.02,r*0.14,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.40,cy+r*0.02,r*0.14,0,Math.PI*2); ctx.fill();

    // ギザギザの口
    ctx.fillStyle = '#2a1f40';
    ctx.beginPath();
    const my = cy+r*0.40;
    ctx.moveTo(cx-r*0.42,my);
    ctx.lineTo(cx-r*0.21,my+r*0.22);
    ctx.lineTo(cx,my);
    ctx.lineTo(cx+r*0.21,my+r*0.22);
    ctx.lineTo(cx+r*0.42,my);
    ctx.closePath();
    ctx.fill();

    // 足
    ctx.fillStyle = pal.dark;
    ctx.beginPath(); ctx.ellipse(cx-r*0.45, cy+r*0.88, r*0.28, r*0.16, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+r*0.45, cy+r*0.88, r*0.28, r*0.16, 0,0,Math.PI*2); ctx.fill();
  }
}

function drawGoal(){
  if(!goal) return;
  const x = worldToScreenX(goal.x);
  if(x < -60 || x > BASE_W+60) return;
  const baseY = goal.y;
  ctx.fillStyle = '#9a9a9a';
  ctx.fillRect(x-3, baseY-158, 6, 158);
  ctx.beginPath(); ctx.ellipse(x, baseY, 15, 6, 0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffd23f';
  ctx.beginPath();
  ctx.moveTo(x+3, baseY-152);
  ctx.lineTo(x+44, baseY-136);
  ctx.lineTo(x+3, baseY-118);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#c99a1a'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#e0453f';
  ctx.beginPath(); ctx.arc(x, baseY-158, 6, 0, Math.PI*2); ctx.fill();
}

function drawParticles(){
  for(const p of particles){
    const x = worldToScreenX(p.x);
    ctx.globalAlpha = clamp(p.life/0.5,0,1);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(x, p.y, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawPlayer(){
  const x = worldToScreenX(player.x);
  const y = player.y;
  const w = player.w, h = player.h;
  if(player.invuln > 0 && Math.floor(player.invuln*12)%2===0){ return; } // 点滅演出

  const bob = (player.onGround && Math.abs(player.vx)>5) ? Math.sin(player.animT*14)*1.4 : 0;

  ctx.save();
  ctx.translate(x + w/2, y + h/2 + bob);
  ctx.scale(-player.facing, 1); // 元イラストは尻尾が右寄りのため反転して進行方向の後ろに来るように

  // 影
  ctx.save();
  ctx.translate(0, h/2 - bob + 5);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0,0,w*0.42,5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // うさぎ画像(添付イラストそのもの)
  const drawW = w*1.65;
  const drawH = drawW*BUNNY_ASPECT;
  if(BUNNY_IMG.complete && BUNNY_IMG.naturalWidth>0){
    ctx.drawImage(BUNNY_IMG, -drawW/2, h/2-drawH, drawW, drawH);
  }

  ctx.restore();
}

function drawHUD(){
  // ライフ(ハート、1UPで3個より増える)
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'left';
  const heartN = clamp(lives, 0, 9);
  for(let i=0;i<heartN;i++){
    ctx.fillStyle = '#ff5c7a';
    ctx.beginPath();
    const hx = BASE_W-30-i*26, hy=26;
    ctx.moveTo(hx,hy+6);
    ctx.bezierCurveTo(hx,hy,hx-10,hy,hx-10,hy+6);
    ctx.bezierCurveTo(hx-10,hy+12,hx,hy+16,hx,hy+20);
    ctx.bezierCurveTo(hx,hy+16,hx+10,hy+12,hx+10,hy+6);
    ctx.bezierCurveTo(hx+10,hy,hx,hy,hx,hy+6);
    ctx.fill();
  }
  if(toastT > 0){
    ctx.save();
    ctx.globalAlpha = clamp(toastT/1.5, 0, 1);
    ctx.fillStyle = '#ffd23f';
    ctx.strokeStyle = '#6b4034';
    ctx.lineWidth = 3;
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText(toastText, BASE_W/2, 70);
    ctx.fillText(toastText, BASE_W/2, 70);
    ctx.restore();
  }
}

function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const scale = (canvas.height/dpr) / BASE_H;
  ctx.setTransform(dpr*scale,0,0,dpr*scale,0,0);

  drawBackground();
  drawPits();
  drawSegments();
  drawPlatforms();
  drawCrates();
  drawHazards();
  drawApples();
  drawEnemies();
  drawGoal();
  if(state==='playing' || state==='over' || state==='stageclear') drawPlayer();
  drawParticles();
  if(state==='playing') drawHUD();
}

/* ===================== メインループ ===================== */
let lastT = performance.now();
function loop(t){
  let dt = (t - lastT)/1000;
  lastT = t;
  dt = Math.min(dt, 0.033);
  update(dt);
  render();
  requestAnimationFrame(loop);
}
resetGame();
requestAnimationFrame(loop);

})();
</script>
</body>
